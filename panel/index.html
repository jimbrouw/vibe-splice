<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg:      #232323;
      --bg2:     #1a1a1a;
      --bg3:     #2e2e2e;
      --border:  #444;
      --text:    #ddd;
      --dim:     #888;
      --ok:      #6c6;
      --err:     #e66;
      --info:    #6af;
      --accent:  #2680eb;
      --accent2: #1a6abf;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Adobe Clean", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      padding: 10px;
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }
    .header h3 { font-size: 14px; color: #fff; }
    .header .version { font-size: 10px; color: var(--dim); }

    /* ── divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0;
    }

    /* ── sidecar status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--err); flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.online { background: var(--ok); }
    #sidecarLabel { flex: 1; font-size: 11px; color: var(--dim); }
    #sidecarLabel.online { color: var(--ok); }

    /* ── camera list ── */
    #camList { margin: 6px 0; }
    .cam-placeholder { color: var(--dim); font-size: 11px; padding: 4px 0; }
    .cam-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      background: var(--bg2);
      border-radius: 3px;
      margin-bottom: 2px;
      font-size: 11px;
    }
    .cam-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 2px;
      padding: 0 4px;
      font-size: 10px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .cam-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cam-offset { color: var(--dim); flex-shrink: 0; }

    /* ── buttons ── */
    button {
      display: block;
      width: 100%;
      margin: 4px 0;
      padding: 7px 10px;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      font-size: 12px;
      font-family: inherit;
    }
    button:hover:not(:disabled) { background: #3a3a3a; border-color: #666; }
    button:active:not(:disabled) { background: #444; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.primary {
      background: var(--accent);
      border-color: var(--accent2);
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover:not(:disabled) { background: var(--accent2); }
    button.small {
      width: auto;
      padding: 3px 8px;
      font-size: 11px;
      margin: 0;
    }
    button.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--dim);
      font-size: 11px;
    }
    button.ghost:hover:not(:disabled) { color: var(--text); background: transparent; }

    /* ── progress ── */
    #progressWrap { margin: 6px 0; display: none; }
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.25s ease;
    }
    #progressFill.indeterminate {
      width: 35%;
      animation: indeterminate 1.2s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    #progressLabel {
      font-size: 10px;
      color: var(--dim);
      margin-top: 3px;
    }

    /* ── open-sequence hint ── */
    #openHint {
      background: #1d2d1d;
      border: 1px solid #3a6a3a;
      border-radius: 4px;
      padding: 7px 9px;
      font-size: 11px;
      color: var(--ok);
      display: none;
      margin: 4px 0;
    }
    #openHint strong { color: #fff; }

    /* ── log ── */
    #log {
      margin-top: 6px;
      padding: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 10px;
    }
    .ok   { color: var(--ok); }
    .err  { color: var(--err); }
    .info { color: var(--info); }
  </style>
</head>
<body>

  <div class="header">
    <h3>Vibe Splice</h3>
    <span class="version">M2</span>
  </div>

  <!-- sidecar status -->
  <div class="status-row">
    <div class="dot" id="sidecarDot"></div>
    <span id="sidecarLabel">Sidecar offline</span>
    <button class="small" id="btnStart">Start</button>
  </div>

  <hr>

  <!-- source list -->
  <div id="camList">
    <div class="cam-placeholder">No sources detected</div>
  </div>

  <button id="btnDetect">Detect Sources</button>
  <button class="primary" id="btnRun" disabled>▶ Analyze &amp; Apply</button>

  <!-- progress -->
  <div id="progressWrap">
    <div class="progress-track">
      <div id="progressFill"></div>
    </div>
    <div id="progressLabel"></div>
  </div>

  <!-- open-sequence hint (Task 3: cosmetic gap) -->
  <div id="openHint"></div>

  <hr>

  <div id="log"></div>
  <button class="ghost" id="btnClearLog">Clear log</button>

  <script src="panel.js"></script>
</body>
</html>
